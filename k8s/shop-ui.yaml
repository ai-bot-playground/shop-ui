# shop-ui on Kubernetes (preprod). nginx serves the SPA and proxies /api to
# the shop-gateway Service (in-cluster DNS). Browse via:
#   kubectl --context kind-preprod -n shop port-forward svc/shop-ui 3001:80
# Apply: kubectl --context kind-preprod apply -f shop-ui/k8s/shop-ui.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-ui
  namespace: shop
  labels:
    app: shop-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-ui
  template:
    metadata:
      labels:
        app: shop-ui
    spec:
      containers:
        - name: shop-ui
          image: localhost/shop-ui:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shop-ui
  namespace: shop
spec:
  type: ClusterIP
  selector:
    app: shop-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
